version: '3.8'

services:
  web:
    build: .
    container_name: gamepulse_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html/src
    depends_on:
      - db

  db:
    image: mysql:8.4
    container_name: gamepulse_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gamepulse
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gamepulse_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  db_data: